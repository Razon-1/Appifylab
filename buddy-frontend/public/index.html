<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Buddy Script - Social Network" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="%PUBLIC_URL%/assets/css/common.css" rel="stylesheet">
    <link href="%PUBLIC_URL%/assets/css/main.css" rel="stylesheet">
    <link href="%PUBLIC_URL%/assets/css/responsive.css" rel="stylesheet">
    <style>
      :root {
        --bg1: #f5f5f5;
        --bg2: #ffffff;
        --bg3: #e8e8e8;
        --bg4: #f0f0f0;
        --bcolor1: #e0e0e0;
        --bcolor2: #d0d0d0;
        --color: #767676;
        --color2: #333333;
        --color3: #999999;
        --color4: #1a1a1a;
        --color5: #1890FF;
      }
      
      [data-theme="dark"] {
        --bg1: #1a1a1a;
        --bg2: #2d2d2d;
        --bg3: #3a3a3a;
        --bg4: #404040;
        --bcolor1: #4a4a4a;
        --bcolor2: #555555;
        --color: #a0a0a0;
        --color2: #f0f0f0;
        --color3: #808080;
        --color4: #e0e0e0;
        --color5: #1890FF;
      }
      
      ._dark_mode {
        background: var(--bg1);
        color: var(--color2);
      }
    </style>
    <title>Buddy Script</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
