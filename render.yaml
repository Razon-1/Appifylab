services:
  - type: web
    name: buddy-script-api
    runtime: python
    plan: free
    rootDir: buddy-backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --no-input
      python manage.py collectstatic --no-input
      python create_admin.py
    startCommand: gunicorn buddy_script.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DB_ENGINE
        value: "postgresql"
      - key: DATABASE_URL
        fromDatabase:
          name: buddy-script-db
          property: connectionString
      - key: ENVIRONMENT
        value: "production"
      - key: CORS_ORIGINS
        value: "https://appifylab-frontend.vercel.app"

databases:
  - name: buddy-script-db
    plan: free
